; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = default
extra_configs = platformio.local.ini

[yac]
version = 1.6.13

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000
build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
	-DDISABLE_FS_H_WARNING=1
	-DDESTRUCTOR_CLOSES_FILE=1
	-DXML_GE=0
	-DXML_CONTEXT_BYTES=1024
	-std=gnu++2a
	-DUSE_UTF8_LONG_NAMES=1
	-DPNG_MAX_BUFFERED_PIXELS=65536
	-Wno-bidi-chars
	-DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
	-DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
	-DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
	-DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
	-DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
	-DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=6144
	-Wl,--wrap=panic_print_backtrace,--wrap=panic_abort
	-DMBEDTLS_SSL_IN_CONTENT_LEN=4096
	-DMBEDTLS_SSL_OUT_CONTENT_LEN=4096
	-DMBEDTLS_SSL_MAX_CONTENT_LEN=4096
	-DARDUINO_LOOP_STACK_SIZE=12288
build_unflags = 
	-std=gnu++11
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
extra_scripts = 
	pre:scripts/build_html.py
	pre:scripts/gen_i18n.py
	pre:scripts/patch_jpegdec.py
	pre:scripts/git_branch.py
lib_deps = 
	BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
	InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
	EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
	SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
	bblanchon/ArduinoJson @ 7.4.2
	ricmoo/QRCode @ 0.0.1
	bitbank2/PNGdec @ ^1.0.0
	bitbank2/JPEGDEC @ ^1.8.0
	links2004/WebSockets @ 2.7.3
	h2zero/NimBLE-Arduino @ 2.3.6

[env:default]
extends = base
build_flags = 
	${base.build_flags}
	-DENABLE_SERIAL_LOG
	-DLOG_LEVEL=2

[env:gh_release]
extends = base
build_flags = 
	${base.build_flags}
	-DYAC_VERSION=\"${yac.version}\"
	-DENABLE_SERIAL_LOG
	-DLOG_LEVEL=1

[env:gh_release_rc]
extends = base
build_flags = 
	${base.build_flags}
	-DYAC_VERSION=\"${yac.version}-rc+${sysenv.CROSSPOINT_RC_HASH}\"
	-DENABLE_SERIAL_LOG
	-DLOG_LEVEL=1

[env:slim]
extends = base
build_flags = 
	${base.build_flags}
	-DYAC_VERSION=\"${yac.version}-slim\"
	-UENABLE_SERIAL_LOG
